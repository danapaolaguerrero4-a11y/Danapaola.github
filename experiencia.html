<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Experiencia Undertale</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
font-family:'Press Start 2P', cursive;
color:white;
text-align:center;
overflow:hidden;
}

/* FONDO ESTRELLAS */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:.3;
animation:stars 25s linear infinite;
z-index:-1;
}

@keyframes stars{
from{
transform:translateY(0);
}
to{
transform:translateY(100px);
}
}

h1{
color:yellow;
margin:20px;
text-shadow:0 0 10px yellow;
}

.dialogo{

width:80%;
max-width:900px;

margin:20px auto;

border:5px solid white;

padding:20px;

line-height:2;

}

.game{

width:700px;
height:400px;

border:6px solid white;

margin:20px auto;

position:relative;

overflow:hidden;

}

#heart{

position:absolute;

font-size:30px;

color:red;

left:330px;

top:300px;

transition:.05s;

}

.enemy{

position:absolute;

font-size:25px;

color:white;

}

.info{

margin-top:20px;

color:lime;

}

.hp{

margin-top:15px;
font-size:14px;

}

.gameover{

color:red;
font-size:30px;
margin-top:20px;

display:none;

}

</style>
</head>

<body>

<h1>UNDERTALE - MINI BATALLA</h1>

<div class="dialogo">
* Usa las flechas del teclado para mover el corazón.<br>
* Evita los ataques que caen desde arriba.<br>
* Sobrevive el mayor tiempo posible.
</div>

<div class="game" id="game">

<div id="heart">♥</div>

</div>

<div class="info">

PUNTOS: <span id="score">0</span>

<div class="hp">
HP: <span id="hp">20</span>/20
</div>

</div>

<div class="gameover" id="gameover">
GAME OVER
</div>

<script>

const heart = document.getElementById("heart");
const game = document.getElementById("game");

let x = 330;
let y = 300;

let hp = 20;
let score = 0;

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowLeft") x-=15;
if(e.key==="ArrowRight") x+=15;
if(e.key==="ArrowUp") y-=15;
if(e.key==="ArrowDown") y+=15;

x=Math.max(0,Math.min(670,x));
y=Math.max(0,Math.min(370,y));

heart.style.left=x+"px";
heart.style.top=y+"px";

});

function createEnemy(){

const enemy=document.createElement("div");

enemy.classList.add("enemy");

enemy.innerHTML="✦";

enemy.style.left=Math.random()*680+"px";

enemy.style.top="-20px";

game.appendChild(enemy);

let fall=setInterval(()=>{

let top=parseInt(enemy.style.top);

enemy.style.top=top+5+"px";

let ex=enemy.offsetLeft;
let ey=enemy.offsetTop;

if(
Math.abs(ex-x)<20 &&
Math.abs(ey-y)<20
){

hp--;

document.getElementById("hp").innerText=hp;

enemy.remove();
clearInterval(fall);

if(hp<=0){

document.getElementById("gameover").style.display="block";

clearInterval(spawn);

}

}

if(top>400){

enemy.remove();
clearInterval(fall);

score++;

document.getElementById("score").innerText=score;

}

},20);

}

let spawn=setInterval(createEnemy,500);

</script>

</body>
</html>
