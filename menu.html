<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
font-family:'Press Start 2P', cursive;
text-align:center;
color:white;
height:100vh;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:30px 30px;
opacity:.4;
}

.heart{
font-size:55px;
color:red;
margin-top:30px;
animation:pulse .8s infinite alternate;
position:relative;
}

@keyframes pulse{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

h1{
color:yellow;
font-size:18px;
margin:20px;
position:relative;
text-shadow:0 0 10px yellow;
}

a{
display:block;
margin:15px;
padding:15px;
border:3px solid white;
color:white;
text-decoration:none;
position:relative;
transition:.3s;
}

a:hover{
background:white;
color:black;
transform:translateX(8px);
}

.footer{
position:absolute;
bottom:20px;
width:100%;
font-size:10px;
color:gray;
}
</style>
</head>
<body>
<div class="heart">♥</div>
<h1>UNDERTALE</h1>

<a href="historia.html" target="contenido">HISTORIA</a>

<a href="legado.html" target="contenido">LEGADO</a>
<a href="experiencia.html" target="contenido">EXPERIENCIA</a>
<div class="footer">
★ SAVE POINT ACTIVADO
</div>
</body>
</html>
